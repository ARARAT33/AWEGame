<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Defender Omega</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #030308;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020206 100%);
        }

        /* Glassmorphic UI Containers */
        .glass-panel {
            background: rgba(15, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 240, 255, 0.05);
            border-radius: 16px;
        }

        /* Top Bar HUD */
        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            z-index: 10;
            pointer-events: none;
        }
        .hud-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .hud-item {
            display: flex;
            flex-direction: column;
        }
        .hud-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #88aaff;
        }
        .hud-value {
            font-size: 18px;
            font-weight: 800;
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }
        .hud-value.gold { color: #ffd700; text-shadow: 0 0 8px rgba(255, 215, 0, 0.6); }
        .hud-value.purple { color: #d000ff; text-shadow: 0 0 8px rgba(208, 0, 255, 0.6); }

        /* Action Buttons Top Right */
        .top-btn-group {
            pointer-events: auto;
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: #00f0ff;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .icon-btn:active {
            transform: scale(0.92);
            background: rgba(0, 240, 255, 0.3);
        }

        /* Health Bar Overlay */
        #hpContainer {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,240,255,0.3);
            border-radius: 6px;
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
        }
        #hpFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #00f0ff);
            box-shadow: 0 0 10px #00f0ff;
            transition: width 0.2s ease;
        }

        /* Mobile Controls */
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            height: 160px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 15;
            pointer-events: none;
        }
        #joystickZone {
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(0, 240, 255, 0.2);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            touch-action: none;
        }
        #joystickKnob {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00f0ff, #0055ff);
            border-radius: 50%;
            position: absolute;
            top: 45px;
            left: 45px;
            box-shadow: 0 0 15px #00f0ff;
            pointer-events: none;
        }
        .action-btns {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            pointer-events: auto;
        }
        .game-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: transform 0.1s ease;
        }
        .game-btn:active { transform: scale(0.9); }
        .btn-fire {
            background: rgba(255, 0, 85, 0.2);
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
            width: 75px;
            height: 75px;
        }
        .btn-emp {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .btn-auto {
            background: rgba(0, 240, 255, 0.2);
            border-color: #00f0ff;
            color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .btn-auto.active {
            background: #00f0ff;
            color: #000;
        }

        /* Overlay Modals */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 3, 10, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            width: 100%;
            max-width: 650px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: relative;
        }
        .modal-title {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
            margin-bottom: 15px;
            text-align: center;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: transparent;
            border: none;
            color: #88aaff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Shop Tabs & List */
        .shop-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,240,255,0.2);
            color: #88aaff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #00f0ff;
            color: #000;
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0,240,255,0.5);
        }

        .shop-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }
        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: background 0.2s;
        }
        .shop-item:hover {
            background: rgba(0, 240, 255, 0.05);
        }
        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .item-name {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
        }
        .item-desc {
            font-size: 12px;
            color: #88aaff;
        }
        .buy-btn {
            background: linear-gradient(135deg, #00f0ff, #0055ff);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
            transition: transform 0.1s;
        }
        .buy-btn:active { transform: scale(0.95); }
        .buy-btn.equipped {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            box-shadow: none;
            cursor: default;
        }

        /* Start Screen Overlay */
        #startScreen {
            text-align: center;
        }
        .main-btn {
            background: linear-gradient(135deg, #ff0055, #ff5500);
            border: none;
            color: #fff;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .main-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.8);
        }

        /* Floating Back Link Button */
        #backBtn {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 20;
            pointer-events: auto;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <a href="../index.html" id="backBtn">← BACK</a>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud" class="glass-panel">
        <div class="hud-group" style="margin-left: 80px;">
            <div class="hud-item">
                <span class="hud-label">Score</span>
                <span class="hud-value" id="valScore">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Coins</span>
                <span class="hud-value gold" id="valCoins">$0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Wave</span>
                <span class="hud-value purple" id="valWave">1</span>
            </div>
        </div>
        <div class="top-btn-group">
            <button class="icon-btn" id="openMarketBtn">🛒</button>
            <button class="icon-btn" id="menuToggleBtn">⋮</button>
        </div>
    </div>

    <!-- HP Bar -->
    <div id="hpContainer">
        <div id="hpFill"></div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="mobileControls">
        <div id="joystickZone">
            <div id="joystickKnob"></div>
        </div>
        <div class="action-btns">
            <button class="game-btn btn-auto" id="btnAuto">AUTO</button>
            <button class="game-btn btn-emp" id="btnEMP">EMP<br><small id="valEMP">x1</small></button>
            <button class="game-btn btn-fire" id="btnFire">FIRE</button>
        </div>
    </div>

    <!-- Start Modal -->
    <div class="modal active" id="modalStart">
        <div class="modal-card glass-panel" id="startScreen">
            <h1 class="modal-title">NEON DEFENDER OMEGA</h1>
            <p style="color: #88aaff; margin-bottom: 20px;">Protect the galaxy using ultra-advanced starships, orbital drones, and tactical fleets.</p>
            <div>
                <button class="main-btn" id="btnStartGame">LAUNCH MISSION</button>
            </div>
        </div>
    </div>

    <!-- Shop Modal -->
    <div class="modal" id="modalShop">
        <div class="modal-card glass-panel">
            <button class="modal-close" id="btnCloseShop">✕</button>
            <h2 class="modal-title">CYBER ARMORY MARKET</h2>
            <div class="shop-tabs" id="shopTabs">
                <button class="tab-btn active" data-cat="ships">Ships (100)</button>
                <button class="tab-btn" data-cat="fleets">Fleets (100)</button>
                <button class="tab-btn" data-cat="drones">Drones (100)</button>
                <button class="tab-btn" data-cat="upgrades">Upgrades (100)</button>
            </div>
            <div class="shop-list" id="shopList"></div>
        </div>
    </div>

    <script>
        // --- Web Audio Synth Engine ---
        class SoundEngine {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }
            playLaser() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            }
            playExplosion() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            }
            playCoin() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                osc.frequency.setValueAtTime(1200, this.ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            }
        }
        const audio = new SoundEngine();

        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Save State & Progress Data
        let state = {
            score: 0,
            coins: 500,
            wave: 1,
            empBombs: 1,
            equippedShip: 0,
            equippedFleet: -1,
            equippedDrone: -1,
            ownedShips: [0],
            ownedFleets: [],
            ownedDrones: [],
            upgrades: { health: 0, damage: 0, magnet: 0 }
        };

        function loadSave() {
            const saved = localStorage.getItem('neon_defender_save');
            if (saved) {
                try { state = Object.assign(state, JSON.parse(saved)); } catch (e) {}
            }
        }
        function writeSave() {
            localStorage.setItem('neon_defender_save', JSON.stringify(state));
        }
        loadSave();

        // --- Shop Items Generators (100 Tiers Each) ---
        const shopData = {
            ships: [],
            fleets: [],
            drones: [],
            upgrades: []
        };

        for (let i = 0; i < 100; i++) {
            const cost = Math.floor(200 * Math.pow(1.15, i));
            shopData.ships.push({
                id: i,
                name: `Apex Vessel Mk-${i + 1}`,
                cost: cost,
                hp: 100 + i * 25,
                dmg: 10 + i * 5,
                desc: `Hull HP: ${100 + i * 25} | Cannon DMG: ${10 + i * 5}`
            });
            shopData.fleets.push({
                id: i,
                name: `Wingmen Armada T-${i + 1}`,
                cost: Math.floor(cost * 1.2),
                count: Math.min(6, 1 + Math.floor(i / 15)),
                dmg: 5 + i * 3,
                desc: `Support Fleet: ${Math.min(6, 1 + Math.floor(i / 15))} Units | Extra DMG`
            });
            shopData.drones.push({
                id: i,
                name: `Orbital Drone v${i + 1}`,
                cost: Math.floor(cost * 1.1),
                dmg: 8 + i * 4,
                desc: `Autonomous Defense Sphere | Fire Damage: ${8 + i * 4}`
            });
        }
        for (let i = 0; i < 100; i++) {
            shopData.upgrades.push({
                id: i,
                name: `Tech Core Rank ${i + 1}`,
                cost: Math.floor(150 * Math.pow(1.14, i)),
                desc: `Boost Hull Resistance & Coin Magnet Radius (+${(i + 1) * 10}%)`
            });
        }

        // --- Game Entities ---
        let player, bullets = [], enemies = [], particles = [], items = [];
        let keys = {}, autoFire = false, isShooting = false;

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 120;
                this.radius = 22;
                this.speed = 7;
                this.maxHp = 100;
                this.hp = 100;
                this.lastShot = 0;
            }
            updateStats() {
                const curShip = shopData.ships[state.equippedShip] || shopData.ships[0];
                this.maxHp = curShip.hp + (state.upgrades.health * 20);
                this.hp = Math.min(this.hp, this.maxHp);
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Ship Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f0ff';

                // Ship Body
                ctx.fillStyle = '#00f0ff';
                ctx.beginPath();
                ctx.moveTo(0, -25);
                ctx.lineTo(20, 20);
                ctx.lineTo(0, 10);
                ctx.lineTo(-20, 20);
                ctx.closePath();
                ctx.fill();

                // Wings Detail
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();

                // Draw Fleets & Drones
                if (state.equippedFleet >= 0) {
                    const fl = shopData.fleets[state.equippedFleet];
                    for (let i = 0; i < fl.count; i++) {
                        const offsetX = (i % 2 === 0 ? 1 : -1) * (35 + Math.floor(i / 2) * 20);
                        ctx.fillStyle = '#ff00aa';
                        ctx.beginPath();
                        ctx.arc(this.x + offsetX, this.y + 20, 8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        class Enemy {
            constructor(isBoss = false) {
                this.isBoss = isBoss;
                this.radius = isBoss ? 50 : 18 + Math.random() * 12;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius * 2;
                this.hp = isBoss ? 500 * state.wave : (15 + state.wave * 10);
                this.maxHp = this.hp;
                this.speed = isBoss ? 1.5 : (2 + Math.random() * 2 + state.wave * 0.2);
                this.color = isBoss ? '#ff0055' : (Math.random() > 0.5 ? '#ffaa00' : '#d000ff');
            }
            update() {
                this.y += this.speed;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                ctx.beginPath();
                if (this.isBoss) {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                } else {
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                }
                ctx.fill();

                // HP Bar
                if (this.hp < this.maxHp) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(this.x - 20, this.y - this.radius - 12, 40, 5);
                    ctx.fillStyle = '#00ff88';
                    ctx.fillRect(this.x - 20, this.y - this.radius - 12, (this.hp / this.maxHp) * 40, 5);
                }

                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, dmg, isFleet = false) {
                this.x = x;
                this.y = y;
                this.dmg = dmg;
                this.speed = 14;
                this.radius = isFleet ? 3 : 5;
                this.color = isFleet ? '#ff00aa' : '#00f0ff';
            }
            update() {
                this.y -= this.speed;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class ItemDrop {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'coin', 'hp', 'emp'
                this.radius = 10;
                this.vy = 2;
            }
            update() {
                this.y += this.vy;
                // Magnet logic
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist < 150) {
                    this.x += (dx / dist) * 6;
                    this.y += (dy / dist) * 6;
                }
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                if (this.type === 'coin') ctx.fillStyle = '#ffd700';
                else if (this.type === 'hp') ctx.fillStyle = '#00ff88';
                else ctx.fillStyle = '#d000ff';
                ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.03;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
                ctx.restore();
            }
        }

        // --- Core Loop Mechanics ---
        function initGame() {
            player = new Player();
            player.updateStats();
            bullets = [];
            enemies = [];
            particles = [];
            items = [];
            updateUI();
        }

        function updateUI() {
            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valCoins').innerText = '$' + state.coins;
            document.getElementById('valWave').innerText = state.wave;
            document.getElementById('valEMP').innerText = 'x' + state.empBombs;
            
            if (player) {
                const hpPct = Math.max(0, (player.hp / player.maxHp) * 100);
                document.getElementById('hpFill').style.width = hpPct + '%';
            }
        }

        let spawnTimer = 0;
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (player) {
                // Movement Controls
                if (keys['KeyA'] || keys['ArrowLeft']) player.x = Math.max(player.radius, player.x - player.speed);
                if (keys['KeyD'] || keys['ArrowRight']) player.x = Math.min(canvas.width - player.radius, player.x + player.speed);
                if (keys['KeyW'] || keys['ArrowUp']) player.y = Math.max(player.radius, player.y - player.speed);
                if (keys['KeyS'] || keys['ArrowDown']) player.y = Math.min(canvas.height - player.radius, player.y + player.speed);

                // Touch Joystick Support
                if (joystickActive) {
                    player.x += joystickVector.x * player.speed;
                    player.y += joystickVector.y * player.speed;
                    player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                    player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
                }

                // Automatic / Manual Shooting
                if ((isShooting || autoFire || keys['Space']) && Date.now() - player.lastShot > 140) {
                    const curShip = shopData.ships[state.equippedShip] || shopData.ships[0];
                    bullets.push(new Bullet(player.x, player.y - 20, curShip.dmg));
                    
                    // Fleet Shooting
                    if (state.equippedFleet >= 0) {
                        const fl = shopData.fleets[state.equippedFleet];
                        for (let i = 0; i < fl.count; i++) {
                            const offsetX = (i % 2 === 0 ? 1 : -1) * (35 + Math.floor(i / 2) * 20);
                            bullets.push(new Bullet(player.x + offsetX, player.y + 10, fl.dmg, true));
                        }
                    }

                    audio.playLaser();
                    player.lastShot = Date.now();
                }

                player.draw();
            }

            // Spawn Enemies
            spawnTimer++;
            if (spawnTimer % Math.max(20, 80 - state.wave * 5) === 0) {
                enemies.push(new Enemy(spawnTimer % 400 === 0));
            }

            // Bullets Logic
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.update();
                b.draw();

                if (b.y < -20) { bullets.splice(i, 1); continue; }

                // Bullet <-> Enemy Collision
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < b.radius + e.radius) {
                        e.hp -= b.dmg;
                        bullets.splice(i, 1);

                        // Sparks
                        for (let k = 0; k < 4; k++) particles.push(new Particle(b.x, b.y, e.color));

                        if (e.hp <= 0) {
                            audio.playExplosion();
                            // Death Particles
                            for (let k = 0; k < 12; k++) particles.push(new Particle(e.x, e.y, e.color));

                            // Loot Drop
                            if (Math.random() > 0.3) items.push(new ItemDrop(e.x, e.y, 'coin'));
                            if (Math.random() > 0.85) items.push(new ItemDrop(e.x, e.y, 'hp'));

                            state.score += e.isBoss ? 500 : 50;
                            if (state.score > state.wave * 1000) state.wave++;

                            enemies.splice(j, 1);
                            updateUI();
                        }
                        break;
                    }
                }
            }

            // Enemies Logic
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update();
                e.draw();

                // Player Collide
                if (player && Math.hypot(e.x - player.x, e.y - player.y) < e.radius + player.radius) {
                    player.hp -= 20;
                    audio.playExplosion();
                    enemies.splice(i, 1);
                    updateUI();

                    if (player.hp <= 0) {
                        alert("GAME OVER! Your Score: " + state.score);
                        state.score = 0;
                        state.wave = 1;
                        initGame();
                    }
                    continue;
                }

                if (e.y > canvas.height + 50) enemies.splice(i, 1);
            }

            // Items Pickups Logic
            for (let i = items.length - 1; i >= 0; i--) {
                const it = items[i];
                it.update();
                it.draw();

                if (player && Math.hypot(it.x - player.x, it.y - player.y) < it.radius + player.radius) {
                    if (it.type === 'coin') {
                        state.coins += 25;
                        audio.playCoin();
                    } else if (it.type === 'hp') {
                        player.hp = Math.min(player.maxHp, player.hp + 30);
                    }
                    items.splice(i, 1);
                    writeSave();
                    updateUI();
                } else if (it.y > canvas.height + 20) {
                    items.splice(i, 1);
                }
            }

            // Particles Logic
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        // --- Controls Event Listeners ---
        window.addEventListener('keydown', e => {
            audio.init();
            keys[e.code] = true;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Joystick Logic
        const joystickZone = document.getElementById('joystickZone');
        const joystickKnob = document.getElementById('joystickKnob');
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', e => {
            audio.init();
            joystickActive = true;
        });
        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.hypot(dx, dy);
            const maxR = 40;

            if (dist > maxR) {
                dx = (dx / dist) * maxR;
                dy = (dy / dist) * maxR;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickVector.x = dx / maxR;
            joystickVector.y = dy / maxR;
        });
        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = `translate(0px, 0px)`;
            joystickVector = { x: 0, y: 0 };
        });

        // Touch Action Buttons
        const btnFire = document.getElementById('btnFire');
        btnFire.addEventListener('touchstart', (e) => { e.preventDefault(); audio.init(); isShooting = true; });
        btnFire.addEventListener('touchend', (e) => { e.preventDefault(); isShooting = false; });
        btnFire.addEventListener('mousedown', () => { audio.init(); isShooting = true; });
        btnFire.addEventListener('mouseup', () => { isShooting = false; });

        document.getElementById('btnAuto').addEventListener('click', function() {
            autoFire = !autoFire;
            this.classList.toggle('active', autoFire);
        });

        document.getElementById('btnEMP').addEventListener('click', () => {
            if (state.empBombs > 0) {
                state.empBombs--;
                enemies = [];
                audio.playExplosion();
                updateUI();
                writeSave();
            }
        });

        // Modals & Shop Controls
        let activeTab = 'ships';

        function renderShop() {
            const list = document.getElementById('shopList');
            list.innerHTML = '';
            
            const itemsArr = shopData[activeTab];
            itemsArr.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'shop-item';

                let isOwned = false;
                let isEquipped = false;

                if (activeTab === 'ships') {
                    isOwned = state.ownedShips.includes(item.id);
                    isEquipped = state.equippedShip === item.id;
                } else if (activeTab === 'fleets') {
                    isOwned = state.ownedFleets.includes(item.id);
                    isEquipped = state.equippedFleet === item.id;
                } else if (activeTab === 'drones') {
                    isOwned = state.ownedDrones.includes(item.id);
                    isEquipped = state.equippedDrone === item.id;
                }

                let btnHtml = '';
                if (isEquipped) {
                    btnHtml = `<button class="buy-btn equipped">EQUIPPED</button>`;
                } else if (isOwned) {
                    btnHtml = `<button class="buy-btn" onclick="equipItem('${activeTab}', ${item.id})">EQUIP</button>`;
                } else {
                    btnHtml = `<button class="buy-btn" onclick="buyItem('${activeTab}', ${item.id})">$${item.cost}</button>`;
                }

                div.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.desc}</div>
                    </div>
                    ${btnHtml}
                `;
                list.appendChild(div);
            });
        }

        window.buyItem = function(cat, id) {
            const item = shopData[cat][id];
            if (state.coins >= item.cost) {
                state.coins -= item.cost;
                if (cat === 'ships') state.ownedShips.push(id);
                if (cat === 'fleets') state.ownedFleets.push(id);
                if (cat === 'drones') state.ownedDrones.push(id);
                equipItem(cat, id);
                writeSave();
                updateUI();
                renderShop();
            } else {
                alert("Not enough coins!");
            }
        };

        window.equipItem = function(cat, id) {
            if (cat === 'ships') state.equippedShip = id;
            if (cat === 'fleets') state.equippedFleet = id;
            if (cat === 'drones') state.equippedDrone = id;
            player.updateStats();
            writeSave();
            renderShop();
        };

        document.getElementById('shopTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('tab-btn')) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeTab = e.target.dataset.cat;
                renderShop();
            }
        });

        document.getElementById('openMarketBtn').addEventListener('click', () => {
            renderShop();
            document.getElementById('modalShop').classList.add('active');
        });
        document.getElementById('btnCloseShop').addEventListener('click', () => {
            document.getElementById('modalShop').classList.remove('active');
        });

        document.getElementById('btnStartGame').addEventListener('click', () => {
            audio.init();
            document.getElementById('modalStart').classList.remove('active');
            initGame();
            gameLoop();
        });
    </script>
</body>
</html>
